<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Trash & Treasure 3D SimCity Edu</title>
<style>
body { margin: 0; overflow: hidden; font-family: Arial; }
#hud {
    position: fixed;
    top: 10px;
    left: 10px;
    background: rgba(255,255,255,0.8);
    padding: 10px;
    z-index: 10;
}
</style>
</head>

<body>

<div id="hud">
    <div>🌍 Trash & Treasure 3D</div>
    <div>Skor: <span id="score">0</span></div>
    <div>Kebersihan: <span id="clean">100</span>%</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>

<script>
// ===== BASIC SETUP =====
let scene = new THREE.Scene();
scene.background = new THREE.Color(0x87ceeb);

let camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);

let renderer = new THREE.WebGLRenderer();
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// LIGHT
let light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(10,20,10);
scene.add(light);

// GROUND (KOTA)
let groundGeo = new THREE.PlaneGeometry(100,100);
let groundMat = new THREE.MeshLambertMaterial({color:0x3cb371});
let ground = new THREE.Mesh(groundGeo, groundMat);
ground.rotation.x = -Math.PI/2;
scene.add(ground);

// ===== PLAYER =====
let playerGeo = new THREE.BoxGeometry(1,2,1);
let playerMat = new THREE.MeshLambertMaterial({color:0x0000ff});
let player = new THREE.Mesh(playerGeo, playerMat);
player.position.y = 1;
scene.add(player);

// CAMERA POSITION
camera.position.set(0,10,10);
camera.lookAt(player.position);

// ===== VARIABLES =====
let score = 0;
let clean = 100;

let trashList = [];

// ===== TRASH CREATION =====
function spawnTrash() {
    let geo = new THREE.BoxGeometry(0.5,0.5,0.5);
    let mat = new THREE.MeshLambertMaterial({color:0xffaa00});
    let trash = new THREE.Mesh(geo, mat);

    trash.position.x = (Math.random()-0.5)*50;
    trash.position.z = (Math.random()-0.5)*50;
    trash.position.y = 0.25;

    trash.userData.type = Math.random() > 0.5 ? "organik" : "anorganik";

    scene.add(trash);
    trashList.push(trash);

    updateClean(-1);
}

// ===== NPC SIMPLE =====
function spawnNPC() {
    let geo = new THREE.SphereGeometry(0.5);
    let mat = new THREE.MeshLambertMaterial({color:0xff0000});
    let npc = new THREE.Mesh(geo, mat);

    npc.position.x = (Math.random()-0.5)*50;
    npc.position.z = (Math.random()-0.5)*50;
    npc.position.y = 0.5;

    scene.add(npc);
}

// ===== MOVEMENT =====
document.addEventListener("keydown", (e)=>{
    let speed = 1;

    if(e.key === "w") player.position.z -= speed;
    if(e.key === "s") player.position.z += speed;
    if(e.key === "a") player.position.x -= speed;
    if(e.key === "d") player.position.x += speed;

    checkPickup();
});

// ===== PICKUP SYSTEM =====
let holding = null;

function checkPickup() {
    trashList.forEach(t=>{
        let dist = player.position.distanceTo(t.position);

        if(dist < 2 && !holding){
            holding = t;
            t.material.color.set(0x999999);
        }
    });
}

// DROP SYSTEM
document.addEventListener("keydown",(e)=>{
    if(e.key === "e" && holding){

        if(holding.userData.type === "organik"){
            score += 10;
            updateClean(+2);
        } else {
            score -= 5;
            updateClean(-2);
        }

        scene.remove(holding);
        trashList = trashList.filter(t=>t!==holding);
        holding = null;

        document.getElementById("score").innerText = score;
    }
});

// ===== CLEAN SYSTEM =====
function updateClean(val){
    clean += val;
    if(clean > 100) clean = 100;
    if(clean < 0) clean = 0;

    document.getElementById("clean").innerText = clean;
}

// ===== GAME LOOP =====
function animate(){
    requestAnimationFrame(animate);

    // camera follow
    camera.position.x = player.position.x;
    camera.position.z = player.position.z + 10;
    camera.lookAt(player.position);

    renderer.render(scene, camera);
}

animate();

// ===== WORLD SPAWN =====
for(let i=0;i<30;i++) spawnTrash();
for(let i=0;i<10;i++) spawnNPC();

setInterval(spawnTrash, 3000);
</script>

</body>
</html>
